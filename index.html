<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORTH PARK | Official Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #fff; --gray: #111; --border: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--accent); margin: 0; text-transform: uppercase; overflow-x: hidden; }

        /* PRELOADER */
        #preloader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 10000; transition: 0.8s ease; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        #preloader.done { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-text { font-family: 'Great Vibes', cursive; font-size: 3.5rem; text-transform: none; background: linear-gradient(90deg, #444, #fff, #444); background-size: 200%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: shine 2s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #000; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5000; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; cursor: pointer; }
        .header-right { display: flex; gap: 15px; }
        .header-right i { cursor: pointer; font-size: 1.2rem; position: relative; }
        .badge { position: absolute; top: -8px; right: -8px; background: #fff; color: #000; font-size: 0.6rem; width: 15px; height: 15px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 900; }

        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; background: #000; z-index: 7000; transition: 0.4s; padding: 60px 30px; border-right: 1px solid var(--border); }
        .sidebar.active { left: 0; }
        .sidebar p { cursor: pointer; margin-bottom: 25px; font-weight: 700; }
        .social-links { display: flex; gap: 20px; margin-top: 40px; font-size: 1.5rem; }
        .social-links a { color: #fff; text-decoration: none; transition: 0.3s; }
        .social-links a:hover { opacity: 0.6; }

        /* PANELS */
        .side-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: #000; z-index: 7000; transition: 0.4s ease; border-left: 1px solid var(--border); padding: 30px; box-sizing: border-box; }
        .side-panel.active { right: 0; }

        /* TABS */
        .tabs { display: flex; justify-content: center; gap: 30px; margin: 30px 0; }
        .tab-btn { background: none; border: none; color: #444; font-weight: 900; cursor: pointer; font-size: 1rem; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid #fff; }

        /* PRODUCTS */
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { background: #000; border: 1px solid #111; text-align: center; padding-bottom: 20px; }
        .product-card img { width: 100%; height: 400px; object-fit: cover; }
        
        .size-picker { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .size-btn { border: 1px solid #333; background: none; color: #fff; padding: 5px 12px; cursor: pointer; font-size: 0.8rem; }
        .size-btn.selected { background: #fff; color: #000; border-color: #fff; }

        .buy-btn { background: #fff; color: #000; border: none; width: 90%; padding: 15px; cursor: pointer; font-weight: 900; }

        /* MODAL ОФОРМЛЕННЯ */
        #order-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 8000; align-items: center; justify-content: center; }
        .modal-content { background: #000; padding: 30px; border: 1px solid var(--border); width: 90%; max-width: 350px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; box-sizing: border-box; outline: none; text-transform: uppercase; }
        .modal-content input::placeholder { color: #555; }
    </style>
</head>
<body>

    <div id="preloader"><div class="loader-text">North Park</div></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars" onclick="toggleSidebar()"></i>
            <div class="logo" onclick="location.reload()">NORTH PARK</div>
        </div>
        <div class="header-right">
            <i class="fas fa-search"></i>
            <i class="fas fa-heart" onclick="togglePanel('wish-panel')"><span id="wish-count" class="badge">0</span></i>
            <i class="fas fa-shopping-cart" onclick="togglePanel('cart-panel')"><span id="cart-count" class="badge">0</span></i>
        </div>
    </header>

    <div id="sidebar" class="sidebar">
        <div onclick="toggleSidebar()" style="text-align:right; cursor:pointer; margin-bottom:30px;"><i class="fas fa-times"></i></div>
        <p onclick="alert('North Park Store')">ПРО НАС</p>
        <p onclick="alert('Відгуки')">ВІДГУКИ</p>
        <p onclick="alert('Контакти')">КОНТАКТИ</p>
        <div class="social-links">
            <a href="https://instagram.com/northpark.shop" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://tiktok.com/@northpark.shop2" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="changeCategory('new', this)">НОВИНКИ</button>
        <button class="tab-btn" onclick="changeCategory('sale', this)">РОЗПРОДАЖ</button>
    </div>

    <div class="container" id="box"></div>

    <div id="cart-panel" class="side-panel">
        <div onclick="togglePanel('cart-panel')" style="text-align:right; cursor:pointer;"><i class="fas fa-times"></i></div>
        <h2 style="margin-bottom:20px;">КОШИК</h2>
        <div id="cart-list"></div>
        <button class="buy-btn" id="order-btn" style="display:none; margin-top:20px;" onclick="openOrderModal()">ОФОРМИТИ ЗАМОВЛЕННЯ</button>
    </div>

    <div id="wish-panel" class="side-panel">
        <div onclick="togglePanel('wish-panel')" style="text-align:right; cursor:pointer;"><i class="fas fa-times"></i></div>
        <h2>ОБРАНЕ</h2>
    </div>

    <div id="order-modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">ОФОРМЛЕННЯ</h2>
            <input type="text" id="u-name" placeholder="ПІБ">
            <input type="text" id="u-phone" placeholder="НОМЕР ТЕЛЕФОНУ">
            <input type="text" id="u-city" placeholder="МІСТО ТА ВІДДІЛЕННЯ НП">
            <button class="buy-btn" onclick="sendToTelegram()">ВІДПРАВИТИ</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8469565804:AAH7DZFzs41vH3qSpe_ZD0VhwmThAJHlVhs';
        const CHAT_ID = '8609029382';

        const products = [
            { id: 1, name: "Hoodie Graphite", price: 1450, cat: "new", img: "https://via.placeholder.com/600x800/111/fff?text=NORTH+PARK" },
            { id: 2, name: "Joggers Night", price: 1200, cat: "new", img: "https://via.placeholder.com/600x800/111/fff?text=NORTH+PARK" },
            { id: 3, name: "Sale T-Shirt", price: 750, cat: "sale", img: "https://via.placeholder.com/600x800/111/fff?text=SALE" }
        ];

        let cart = [];
        let selectedSizes = {};

        window.onload = () => {
            setTimeout(() => document.getElementById('preloader').classList.add('done'), 1200);
            show('new');
        };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function togglePanel(id) { document.getElementById(id).classList.toggle('active'); }

        function selectSize(id, size, btn) {
            selectedSizes[id] = size;
            const card = btn.closest('.product-card');
            card.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function show(cat) {
            const box = document.getElementById('box');
            box.innerHTML = products.filter(p => p.cat === cat).map(p => `
                <div class="product-card">
                    <img src="${p.img}">
                    <div style="padding:15px;">
                        <div style="font-weight:700;">${p.name}</div>
                        <div style="font-weight:900; margin:10px 0;">${p.price} UAH</div>
                        <div class="size-picker">
                            <button class="size-btn" onclick="selectSize(${p.id}, 'S', this)">S</button>
                            <button class="size-btn" onclick="selectSize(${p.id}, 'M', this)">M</button>
                            <button class="size-btn" onclick="selectSize(${p.id}, 'L', this)">L</button>
                            <button class="size-btn" onclick="selectSize(${p.id}, 'XL', this)">XL</button>
                        </div>
                        <button class="buy-btn" onclick="addToCart(${p.id})">У КОШИК</button>
                    </div>
                </div>
            `).join('');
        }

        function changeCategory(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            show(cat);
        }

        function addToCart(id) {
            if(!selectedSizes[id]) { alert("ОБЕРІТЬ РОЗМІР!"); return; }
            cart.push({...products.find(p => p.id === id), size: selectedSizes[id]});
            updateUI();
            togglePanel('cart-panel');
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-count').style.display = cart.length > 0 ? 'flex' : 'none';
            document.getElementById('cart-list').innerHTML = cart.map((i, idx) => `
                <div style="padding:10px; border-bottom:1px solid #111; font-size:0.8rem;">
                    ${i.name} (${i.size}) — ${i.price} UAH
                </div>
            `).join('');
            document.getElementById('order-btn').style.display = cart.length > 0 ? 'block' : 'none';
        }

        function openOrderModal() { togglePanel('cart-panel'); document.getElementById('order-modal').style.display = 'flex'; }

        function sendToTelegram() {
            const n = document.getElementById('u-name').value;
            const p = document.getElementById('u-phone').value;
            const c = document.getElementById('u-city').value;
            if(!n || !p || !c) return;

            let msg = `🏔 ЗАМОВЛЕННЯ\nКлієнт: ${n}\nТел: ${p}\nНП: ${c}\nТовари:\n` + cart.map(i => `- ${i.name} (РOЗМІР: ${i.size})`).join('\n');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
            }).then(() => {
                cart = []; updateUI();
                document.getElementById('order-modal').style.display = 'none';
            });
        }
    </script>
</body>
</html>
