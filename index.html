<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORTH PARK | Official Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #fff; --gray: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--accent); margin: 0; text-transform: uppercase; overflow-x: hidden; }

        /* --- ЕФЕКТ ПРИ ЗАПУСКУ (З БЛЮРОМ) --- */
        #preloader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 10000; transition: 0.8s ease; 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
        }
        #preloader.done { opacity: 0; visibility: hidden; pointer-events: none; }
        
        .loader-text { 
            font-family: 'Great Vibes', cursive; font-size: 3.5rem; text-transform: none; 
            background: linear-gradient(to right, #444 20%, #fff 40%, #fff 60%, #444 80%);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shine 2s linear infinite; 
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #000; border-bottom: 1px solid var(--gray); position: sticky; top: 0; z-index: 5000; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; cursor: pointer; }
        
        .header-right { display: flex; gap: 15px; }
        .header-right i { cursor: pointer; font-size: 1.2rem; position: relative; }
        .badge { position: absolute; top: -8px; right: -8px; background: #fff; color: #000; font-size: 0.6rem; width: 15px; height: 15px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 900; }

        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; background: #000; z-index: 7000; transition: 0.4s; padding: 60px 30px; border-right: 1px solid var(--gray); }
        .sidebar.active { left: 0; }
        .sidebar p { cursor: pointer; margin-bottom: 25px; font-weight: 700; }

        /* ПАНЕЛІ КOШИКА ТА ОБРАНОГО */
        .side-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: #000; z-index: 7000; transition: 0.4s ease; border-left: 1px solid var(--gray); padding: 30px; box-sizing: border-box; }
        .side-panel.active { right: 0; }

        /* ВКЛАДКИ (НОВИНКИ / РОЗПРОДАЖ) */
        .tabs { display: flex; justify-content: center; gap: 30px; margin: 30px 0; }
        .tab-btn { background: none; border: none; color: #444; font-weight: 900; cursor: pointer; font-size: 1rem; letter-spacing: 1px; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid #fff; }

        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { background: #000; border: 1px solid #111; text-align: center; }
        .product-card img { width: 100%; height: 400px; object-fit: cover; }
        .buy-btn { background: #fff; color: #000; border: none; width: 100%; padding: 15px; cursor: pointer; font-weight: 900; margin-top: 15px; }

        /* МОДАЛКА */
        #order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 8000; align-items: center; justify-content: center; }
        .modal-content { background: #000; padding: 30px; border: 1px solid #222; width: 90%; max-width: 350px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="preloader"><div class="loader-text">North Park</div></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars" onclick="toggleSidebar()"></i>
            <div class="logo" onclick="location.reload()">NORTH PARK</div>
        </div>
        <div class="header-right">
            <i class="fas fa-search" onclick="alert('Пошук...')"></i>
            <i class="fas fa-heart" onclick="togglePanel('wish-panel')"><span id="wish-count" class="badge">0</span></i>
            <i class="fas fa-shopping-cart" onclick="togglePanel('cart-panel')"><span id="cart-count" class="badge">0</span></i>
        </div>
    </header>

    <div id="sidebar" class="sidebar">
        <div onclick="toggleSidebar()" style="text-align:right; cursor:pointer; margin-bottom:30px;"><i class="fas fa-times"></i></div>
        <p onclick="alert('North Park — твій стиль')">ПРО НАС</p>
        <p onclick="alert('Відгуки')">ВІДГУКИ</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="changeCategory('new', this)">НОВИНКИ</button>
        <button class="tab-btn" onclick="changeCategory('sale', this)">РОЗПРОДАЖ</button>
    </div>

    <div class="container" id="box"></div>

    <div id="cart-panel" class="side-panel">
        <div onclick="togglePanel('cart-panel')" style="text-align:right; cursor:pointer;"><i class="fas fa-times"></i></div>
        <h2>КОШИК</h2>
        <div id="cart-list"></div>
        <button class="buy-btn" id="order-btn" style="display:none;" onclick="openOrderModal()">ОФОРМИТИ ЗАМОВЛЕННЯ</button>
    </div>

    <div id="wish-panel" class="side-panel">
        <div onclick="togglePanel('wish-panel')" style="text-align:right; cursor:pointer;"><i class="fas fa-times"></i></div>
        <h2>ОБРАНЕ</h2>
    </div>

    <div id="order-modal">
        <div class="modal-content">
            <h2>ОФОРМЛЕННЯ</h2>
            <input type="text" id="u-name" placeholder="ІМ'Я">
            <input type="text" id="u-phone" placeholder="ТЕЛЕФОН">
            <input type="text" id="u-city" placeholder="МІСТО / НП">
            <button class="buy-btn" onclick="sendToTelegram()">ВІДПРАВИТИ</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8469565804:AAH7DZFzs41vH3qSpe_ZD0VhwmThAJHlVhs';
        const CHAT_ID = '8609029382';

        const products = [
            { id: 1, name: "Hoodie Graphite", price: 1450, cat: "new", img: "https://via.placeholder.com/600x800/111/fff?text=NEW+DROP" },
            { id: 2, name: "Tech Joggers", price: 1200, cat: "new", img: "https://via.placeholder.com/600x800/111/fff?text=NEW+DROP" },
            { id: 3, name: "Sale T-Shirt", price: 750, cat: "sale", img: "https://via.placeholder.com/600x800/111/fff?text=SALE" }
        ];

        let cart = [];

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('done');
            }, 1200);
            show('new');
        };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function togglePanel(id) { document.getElementById(id).classList.toggle('active'); }

        function show(cat) {
            const box = document.getElementById('box');
            box.innerHTML = products.filter(p => p.cat === cat).map(p => `
                <div class="product-card">
                    <img src="${p.img}">
                    <div style="padding:15px;">
                        <div>${p.name}</div>
                        <div style="font-weight:900; margin:10px 0;">${p.price} UAH</div>
                        <button class="buy-btn" onclick="addToCart(${p.id})">У КОШИК</button>
                    </div>
                </div>
            `).join('');
        }

        function changeCategory(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            show(cat);
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            updateUI();
            togglePanel('cart-panel');
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-count').style.display = cart.length > 0 ? 'flex' : 'none';
            document.getElementById('cart-list').innerHTML = cart.map(i => `<div style="padding:10px; border-bottom:1px solid #111;">${i.name} - ${i.price} UAH</div>`).join('');
            document.getElementById('order-btn').style.display = cart.length > 0 ? 'block' : 'none';
        }

        function openOrderModal() { togglePanel('cart-panel'); document.getElementById('order-modal').style.display = 'flex'; }

        function sendToTelegram() {
            const n = document.getElementById('u-name').value;
            const p = document.getElementById('u-phone').value;
            const c = document.getElementById('u-city').value;
            let msg = `🏔 ЗАМОВЛЕННЯ\nКлієнт: ${n}\nТел: ${p}\nНП: ${c}\nТовари:\n` + cart.map(i => `- ${i.name}`).join('\n');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
            }).then(() => {
                alert("ДЯКУЄМО! ЗАМОВЛЕННЯ ВІДПРАВЛЕНО.");
                cart = []; updateUI();
                document.getElementById('order-modal').style.display = 'none';
            });
        }
    </script>
</body>
</html>
